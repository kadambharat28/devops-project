apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-project

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-project

  template:
    metadata:
      labels:
        app: devops-project

    spec:
      containers:
      - name: devops-project

        image: infrasupport9211/devops-project:v3.1
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
